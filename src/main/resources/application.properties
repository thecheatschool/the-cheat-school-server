# Server Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=${SPRING_APPLICATION_NAME:thecheatschoolserver}

# Sanity Configuration
sanity.project-id=${SANITY_PROJECT_ID}
sanity.dataset=${SANITY_DATASET:production}
sanity.api-version=${SANITY_API_VERSION:2024-01-01}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Cache Configuration
spring.cache.type=caffeine
spring.cache.cache-names=blogs
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Resend Configuration
resend.api.key=${RESEND_API_KEY}
contact.recipient.email=${CONTACT_RECIPIENT_EMAIL}

# Logging
logging.level.com.thecheatschool.server=INFO
logging.level.com.thecheatschool.server.service=DEBUG